<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .hero {
            background-color: #f8f9fa;
            padding: 50px;
            text-align: center;
        }
        .section {
            padding: 50px;
        }
        .tech-carousel {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 20px;
            gap: 15px;
            white-space: nowrap;
        }
        .tech-block {
            flex: 0 0 auto;
            width: 150px;
            text-align: center;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            background: #fff;
        }
        .tech-block:hover {
            transform: scale(1.05);
        }
        .carousel-container {
            position: relative;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 50px;
            cursor: pointer;
            border-radius: 50%;
        }
        .prev-btn {
            left: 10px;
        }
        .next-btn {
            right: 10px;
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Olá, sou Paulo Amorim 👋</h1>
        <p>Desenvolvedor apaixonado por criar interfaces incríveis!</p>
    </section>
    
    <section class="section container">
        <h2>Minhas Tecnologias</h2>
        <div class="carousel-container">
            <button class="carousel-btn prev-btn" onclick="scrollCarousel(-200)">&#10094;</button>
            <div class="tech-carousel" id="techCarousel">
                <div class="tech-block" onclick="showProjects('uiux')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f8/Design_De_Interface.png/400px-Design_De_Interface.png" width="150"><br>
                    <h4>UI/UX Design</h4>
                </div>
                <div class="tech-block" onclick="showProjects('java')">
                    <img src="https://upload.wikimedia.org/wikipedia/en/3/30/Java_programming_language_logo.svg" width="60"><br>
                    <h4>Java</h4>
                </div>
                <div class="tech-block" onclick="showProjects('javascript')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/99/Unofficial_JavaScript_logo_2.svg" width="80"><br>
                    <h4>JavaScript</h4>
                </div>
                <div class="tech-block" onclick="showProjects('cpp')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/18/ISO_C%2B%2B_Logo.svg" width="80"><br>
                    <h4>C++</h4>
                </div>
                <div class="tech-block" onclick="showProjects('c')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/C_Logo.png" width="80"><br>
                    <h4>C</h4>
                </div>
                <div class="tech-block" onclick="showProjects('htmlcss')">
                    <img src="https://img-c.udemycdn.com/course/750x422/539660_27d6_7.jpg" width="150"><br>
                    <h4>HTML/CSS</h4>
                </div>
                <div class="tech-block" onclick="showProjects('python')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg" width="80"><br>
                    <h4>Python</h4>
                </div>
                <div class="tech-block" onclick="showProjects('react')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg" width="80"><br>
                    <h4>React</h4>
                </div>
            </div>
            <button class="carousel-btn next-btn" onclick="scrollCarousel(200)">&#10095;</button>
        </div>
    </section>
    
    <section class="section container">
        <h2>Projetos</h2>
        <div id="project-list" class="row"></div>
    </section>
    
    <script>
        function scrollCarousel(distance) {
            document.getElementById("techCarousel").scrollBy({ left: distance, behavior: 'smooth' });
        }
        
        const projects = {
            uiux: [
                { name: "AlertaBlu", link: "https://www.figma.com/xxxxxx" },
                { name: "Baymax", link: "https://www.figma.com/yyyyyy" }
            ],
            java: [
                { name: "StudyFlow", link: "https://www.figma.com/xxxxxx" },
                { name: "Calculadora", link: "https://www.figma.com/yyyyyy" },
            ],
            javascript: [
                { name: "Jogo da Velha", link: "https://www.figma.com/zzzzzz" }
            ],
            python: [
                { name: "Automação de Processos", link: "https://github.com/seu_repositorio" }
            ],
            react: [
                { name: "Dashboard Interativa", link: "https://github.com/seu_repositorio" }
            ]
        };
        
        function showProjects(tech) {
            const projectList = document.getElementById("project-list");
            projectList.innerHTML = "";
            
            if (!projects[tech]) {
                projectList.innerHTML = "<p>Nenhum projeto disponível para esta tecnologia.</p>";
                return;
            }
            
            projects[tech].forEach(proj => {
                projectList.innerHTML += `
                    <div class="col-md-4 project-block">
                        <a href="${proj.link}" target="_blank">${proj.name}</a>
                    </div>
                `;
            });
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
