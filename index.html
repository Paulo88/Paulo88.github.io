<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .hero {
            background-color: #f8f9fa;
            padding: 50px;
            text-align: center;
        }
        .section {
            padding: 50px;
        }
        .tech-block {
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .tech-block:hover {
            transform: scale(1.05);
        }
        .project-block {
            text-align: center;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Olá, sou Paulo Amorim 👋</h1>
        <p>Desenvolvedor apaixonado por criar interfaces incríveis!</p>
    </section>
    
    <section class="section container">
        <h2>Minhas Tecnologias</h2>
        <div class="row">
            <div class="col-md-4 tech-block" onclick="showProjects('uiux')">
                <img src="https://www.sobrinhodev.com.br/resources/imagens/noticias/d7dab884912f475e2347f9c0605c458eux.webp" width="50"><br>
                <h4>UI/UX Design</h4>
            </div>
            <div class="col-md-4 tech-block" onclick="showProjects('java')">
                <img src="java_logo.png" width="50"><br>
                <h4>Java</h4>
            </div>
            <div class="col-md-4 tech-block" onclick="showProjects('javascript')">
                <img src="js_logo.png" width="50"><br>
                <h4>JavaScript</h4>
            </div>
        </div>
    </section>
    
    <section class="section container">
        <h2>Projetos</h2>
        <div id="project-list" class="row"></div>
    </section>
    
    <script>
        const projects = {
            uiux: [
                { name: "AlertaBlu", link: "https://www.figma.com/xxxxxx" },
                { name: "Baymax", link: "https://www.figma.com/yyyyyy" }
            ],
            java: [
                { name: "StudyFlow", link: "https://www.figma.com/xxxxxx" },
                { name: "Calculadora", link: "https://www.figma.com/yyyyyy" }
            ],
            javascript: [
                { name: "Jogo da Velha", link: "https://www.figma.com/zzzzzz" }
            ]
        };
        
        function showProjects(tech) {
            const projectList = document.getElementById("project-list");
            projectList.innerHTML = "";
            projects[tech].forEach(proj => {
                projectList.innerHTML += `
                    <div class="col-md-4 project-block">
                        <a href="${proj.link}" target="_blank">${proj.name}</a>
                    </div>
                `;
            });
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
